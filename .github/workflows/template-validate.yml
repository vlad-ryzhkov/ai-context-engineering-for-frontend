name: Template Validation

on:
  push:
    branches: [main]
    paths:
      - ".claude/**"
      - ".agents/**"
      - ".cursor/**"
      - "CLAUDE.md"
      - "AGENTS.md"
  pull_request:
    paths:
      - ".claude/**"
      - ".agents/**"
      - ".cursor/**"
      - "CLAUDE.md"
      - "AGENTS.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SKILL.md YAML frontmatter
        run: |
          echo "Checking SKILL.md files have valid YAML frontmatter..."
          errors=0
          for file in .claude/skills/*/SKILL.md; do
            if ! head -1 "$file" | grep -q "^---$"; then
              echo "❌ Missing YAML frontmatter: $file"
              errors=$((errors + 1))
            fi
            if ! grep -q "^name:" "$file"; then
              echo "❌ Missing 'name:' field: $file"
              errors=$((errors + 1))
            fi
            if ! grep -q "^description:" "$file"; then
              echo "❌ Missing 'description:' field: $file"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors validation errors"
            exit 1
          fi
          echo "✅ All SKILL.md files have valid frontmatter"

      - name: Check skill count matches README
        run: |
          skill_count=$(ls -d .claude/skills/*/SKILL.md 2>/dev/null | wc -l | tr -d ' ')
          readme_count=$(grep -oE '[0-9]+ skills' README.md | head -1 | grep -oE '[0-9]+')
          echo "Skills found: $skill_count"
          echo "README claims: $readme_count"
          if [ "$skill_count" != "$readme_count" ]; then
            echo "⚠️ WARNING: Skill count mismatch (found: $skill_count, README: $readme_count)"
          else
            echo "✅ Skill count matches README"
          fi

      - name: Validate Codex wrappers match skills
        run: |
          echo "Checking Codex wrappers..."
          missing=0
          for skill_dir in .claude/skills/*/; do
            skill_name=$(basename "$skill_dir")
            if [ ! -f ".agents/skills/$skill_name/SKILL.md" ]; then
              echo "❌ Missing Codex wrapper: .agents/skills/$skill_name/SKILL.md"
              missing=$((missing + 1))
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "Found $missing missing Codex wrappers"
            exit 1
          fi
          echo "✅ All skills have Codex wrappers"

      - name: Validate anti-pattern index references
        run: |
          echo "Checking anti-pattern index..."
          errors=0
          for file in .claude/fe-antipatterns/**/*.md; do
            basename_file=$(basename "$file")
            if [ "$basename_file" = "_index.md" ]; then
              continue
            fi
            # Get relative path from fe-antipatterns dir
            rel_path=${file#.claude/fe-antipatterns/}
            if ! grep -q "$rel_path" .claude/fe-antipatterns/_index.md 2>/dev/null; then
              echo "❌ Not indexed: $rel_path"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors unindexed anti-patterns"
            exit 1
          fi
          echo "✅ All anti-patterns are indexed"

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "CLAUDE.md,AGENTS.md,README.md,.claude/**/*.md"
        continue-on-error: true
